<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="The Moon Estate">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#23252f"/>
      <stop offset="60%" stop-color="#15161d"/>
      <stop offset="100%" stop-color="#060608"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6e2a6"/>
      <stop offset="45%" stop-color="#d8b25a"/>
      <stop offset="100%" stop-color="#a9802c"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3dd9c"/>
      <stop offset="100%" stop-color="#b1862f"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="url(#gold)" stroke-width="1.4" opacity="0.85"/>

  <!-- crescent moon -->
  <path d="M58 22 a30 30 0 1 0 0 56 a24 24 0 1 1 0 -56 z" fill="url(#gold)"/>

  <!-- stars -->
  <g fill="url(#gold)">
    <circle cx="64" cy="27" r="1.4"/>
    <circle cx="71" cy="33" r="1"/>
    <circle cx="60" cy="34" r="0.9"/>
    <circle cx="74" cy="26" r="0.8"/>
  </g>

  <!-- skyline -->
  <g fill="url(#goldV)">
    <rect x="38" y="44" width="6" height="22" rx="1"/>
    <rect x="45" y="36" width="7" height="30" rx="1"/>
    <rect x="53" y="40" width="6" height="26" rx="1"/>
    <rect x="60" y="48" width="5" height="18" rx="1"/>
    <rect x="32" y="50" width="5" height="16" rx="1"/>
    <!-- tallest tower with peak -->
    <polygon points="48.5,30 52,36 45,36"/>
  </g>
  <!-- window hints -->
  <g fill="#15161d" opacity="0.55">
    <rect x="47" y="40" width="3" height="2"/>
    <rect x="47" y="45" width="3" height="2"/>
    <rect x="54.5" y="44" width="2.5" height="2"/>
    <rect x="39.5" y="48" width="2.5" height="2"/>
  </g>

  <!-- waves / foreground -->
  <g fill="none" stroke="url(#gold)" stroke-width="1.6" stroke-linecap="round">
    <path d="M30 70 q10 -5 20 0 t20 0" opacity="0.95"/>
    <path d="M33 74 q9 -4 17 0 t16 0" opacity="0.6"/>
  </g>
</svg>
